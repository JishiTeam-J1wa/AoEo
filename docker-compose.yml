version: "3.8"

services:
  # ---------------------------------------------------------------------------
  # OpenAI Privacy Filter (OPF) Cluster — 3 instances for parallel PII detection
  # Go SDK's LoadBalancedClient connects directly to all instances for optimal
  # performance (health checks, EWMA latency tracking, automatic failover).
  # ---------------------------------------------------------------------------
  opf-1:
    image: ghcr.io/gh0stkey/opf-privacy-filter:latest
    environment:
      - OPF_DEVICE=cpu
      - OPF_OUTPUT_MODE=typed
    networks:
      - aoeo
    # GPU acceleration (uncomment if available):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

  opf-2:
    image: ghcr.io/gh0stkey/opf-privacy-filter:latest
    environment:
      - OPF_DEVICE=cpu
      - OPF_OUTPUT_MODE=typed
    networks:
      - aoeo

  opf-3:
    image: ghcr.io/gh0stkey/opf-privacy-filter:latest
    environment:
      - OPF_DEVICE=cpu
      - OPF_OUTPUT_MODE=typed
    networks:
      - aoeo

  # ---------------------------------------------------------------------------
  # Nginx Load Balancer for OPF cluster (optional, for Sidecar backward-compat)
  # ---------------------------------------------------------------------------
  nginx-opf:
    image: nginx:alpine
    ports:
      - "9000:9000"
    volumes:
      - ./nginx-opf.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - opf-1
      - opf-2
      - opf-3
    networks:
      - aoeo

  # ---------------------------------------------------------------------------
  # Privacy Sidecar Proxy (optional, backward-compatible /detect API)
  # Routes to OPF cluster via Nginx
  # ---------------------------------------------------------------------------
  privacy-sidecar:
    build:
      context: ./cmd/privacy-sidecar
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - OPF_ENDPOINT=http://nginx-opf:9000
      - PORT=8080
      - LOG_LEVEL=info
      - TIMEOUT=30
    depends_on:
      - nginx-opf
    networks:
      - aoeo

  # ---------------------------------------------------------------------------
  # AoEo AI Gateway
  # Go SDK connects DIRECTLY to all OPF instances (LoadBalancedClient).
  # Uses LeastLatency strategy for optimal routing based on inference speed.
  # ---------------------------------------------------------------------------
  aoeo-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - AOEO_PRIVACY_ENABLED=true
      - AOEO_PRIVACY_ENDPOINT=http://opf-1:8000,http://opf-2:8000,http://opf-3:8000
      - AOEO_PRIVACY_POLICY=pseudonymize
      - AOEO_PRIVACY_FAILOPEN=false
    depends_on:
      - opf-1
      - opf-2
      - opf-3
    networks:
      - aoeo

networks:
  aoeo:
    driver: bridge
