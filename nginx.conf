events {
    worker_connections 1024;
}

http {
    upstream privacy_cluster {
        least_conn;
        server privacy-sidecar-1:8080;
        server privacy-sidecar-2:8080;
        server privacy-sidecar-3:8080;
        keepalive 32;
    }

    # Limit request body size to prevent OOM from malicious large texts
    client_max_body_size 1m;

    server {
        listen 8080;

        # Legacy /detect endpoints (backward-compatible)
        location /detect {
            proxy_pass http://privacy_cluster;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # OPF-native /redact endpoints (pass-through)
        location /redact {
            proxy_pass http://privacy_cluster;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        location /health {
            proxy_pass http://privacy_cluster;
            proxy_connect_timeout 2s;
        }
    }
}
