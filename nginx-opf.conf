events {
    worker_connections 1024;
}

http {
    upstream opf_cluster {
        least_conn;
        server opf-1:8000;
        server opf-2:8000;
        server opf-3:8000;
        keepalive 32;
    }

    # Limit request body size to prevent OOM from large texts
    client_max_body_size 1m;

    server {
        listen 9000;

        # OPF /redact endpoints
        location /redact {
            proxy_pass http://opf_cluster;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # OPF /health endpoint
        location /health {
            proxy_pass http://opf_cluster;
            proxy_connect_timeout 2s;
        }
    }
}
