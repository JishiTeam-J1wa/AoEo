version: "1.0"
updated_at: "2026-05-29T10:00:00Z"

# IP 规则：攻击 IP 阻断，内网 IP 脱敏
ip_rules:
  blocklist:
    - id: "ip-attack-001"
      value: "191.1.1.1"
      category: "attack_ip"
      severity: critical
      description: "已知攻击源 IP"
      action: block

  allowlist:
    - id: "ip-internal-001"
      value: "192.2.2.2"
      category: "internal_ip"
      severity: medium
      description: "内部运维服务器"
      action: mask

  cidr_blocks:
    - id: "cidr-internal-001"
      value: "10.0.0.0/8"
      category: "internal_network"
      severity: medium
      action: mask
      description: "内网 A 段"

    - id: "cidr-internal-002"
      value: "172.16.0.0/12"
      category: "internal_network"
      severity: medium
      action: mask

    - id: "cidr-internal-003"
      value: "192.168.0.0/16"
      category: "internal_network"
      severity: medium
      action: mask

# 域名规则：内部域名脱敏
domain_rules:
  blocklist:
    - id: "domain-bad-001"
      value: "malware.example.com"
      category: "malicious_domain"
      severity: critical
      action: block

  allowlist:
    - id: "domain-internal-001"
      value: "www.x1.com"
      category: "internal_domain"
      severity: high
      action: mask
      description: "内部管理平台"

    - id: "domain-internal-002"
      value: "api.internal.company.com"
      category: "internal_domain"
      severity: high
      action: mask

# 关键词规则：敏感词阻断
keyword_rules:
  - id: "kw-001"
    value: "机密"
    category: "confidential_mark"
    severity: high
    action: block

  - id: "kw-002"
    value: "绝密"
    category: "confidential_mark"
    severity: critical
    action: block

  - id: "kw-003"
    value: "内部资料"
    category: "confidential_mark"
    severity: high
    action: block

# 正则规则：工号、合同编号等
regex_rules:
  - id: "regex-001"
    pattern: "[A-Z]{2}\\d{8}"
    category: "employee_id"
    severity: medium
    action: mask

  - id: "regex-002"
    pattern: "\\b(?:\\d{4}[-.]?){2}\\d{4}\\b"
    category: "account_number"
    severity: high
    action: mask
